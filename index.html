<!DOCTYPE html>
<html>
<head>
<title>My Health Tracker</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.container{
    background:white;
    width:300px;
    margin:auto;
    padding:20px;
    border-radius:10px;
}

input{
    width:90%;
    padding:8px;
    margin:5px;
}

button{
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
}

.result{
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Health Tracker</h2>

<p>Steps Walked</p>
<input type="number" id="steps">

<p>Water Intake (glasses)</p>
<input type="number" id="water">

<p>Sleep Hours</p>
<input type="number" id="sleep">

<br>

<button onclick="trackHealth()">Save Health Data</button>

<div class="result" id="output"></div>

</div>

<script>

function trackHealth(){

let steps = document.getElementById("steps").value;
let water = document.getElementById("water").value;
let sleep = document.getElementById("sleep").value;

let message =
"Today's Health Record <br>" +
"Steps: " + steps + "<br>" +
"Water: " + water + " glasses<br>" +
"Sleep: " + sleep + " hours";

document.getElementById("output").innerHTML = message;

}

</script>

</body>
</html>
